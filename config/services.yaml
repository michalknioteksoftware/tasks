parameters: {  }

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    App\Infrastructure\GraphQL\ResolverMap\AppResolverMap:
        tags:
            - { name: overblog_graphql.resolver_map, schema: default }

