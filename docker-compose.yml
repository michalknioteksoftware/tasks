services:
  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tasks_php
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    networks:
      - tasks_network
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    container_name: tasks_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - tasks_network
    depends_on:
      - php

  db:
    image: postgres:16-alpine
    container_name: tasks_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tasks}
      POSTGRES_USER: ${POSTGRES_USER:-tasks}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tasks_secret}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - tasks_network

networks:
  tasks_network:
    driver: bridge

volumes:
  postgres_data:
