services:
  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tasks_php
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    networks:
      - tasks_network
    depends_on:
      - db
      - rabbitmq
      - redis

  nginx:
    image: nginx:alpine
    container_name: tasks_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - tasks_network
    depends_on:
      - php

  db:
    image: postgres:16-alpine
    container_name: tasks_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tasks}
      POSTGRES_USER: ${POSTGRES_USER:-tasks}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tasks_secret}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - tasks_network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: tasks_rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-tasks}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-tasks_secret}
    networks:
      - tasks_network

  redis:
    image: redis:7-alpine
    container_name: tasks_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - tasks_network

  messenger_amqp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tasks_messenger_amqp
    restart: unless-stopped
    working_dir: /var/www
    command: ["php", "bin/console", "messenger:consume", "async_amqp", "-vv"]
    volumes:
      - .:/var/www
    networks:
      - tasks_network
    depends_on:
      - php
      - rabbitmq
      - db

  messenger_redis:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tasks_messenger_redis
    restart: unless-stopped
    working_dir: /var/www
    command: ["php", "bin/console", "messenger:consume", "async_redis", "-vv"]
    volumes:
      - .:/var/www
    networks:
      - tasks_network
    depends_on:
      - php
      - redis
      - db

networks:
  tasks_network:
    driver: bridge

volumes:
  postgres_data:
